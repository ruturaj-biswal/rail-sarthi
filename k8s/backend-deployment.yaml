apiVersion: apps/v1
kind: Deployment
metadata:
  name: railsaarthi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: railsaarthi-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
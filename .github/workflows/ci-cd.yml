name: RailSaarthi CI/CD

on:
  push:
    branches:
      - main
      - master

jobs:

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: railsaarthi-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rail-saarthi-backend/rail-saarthi-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Backend
        run: mvn clean package -DskipTests

  docker-build:
    runs-on: ubuntu-latest

    needs:
      - frontend-build
      - backend-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: docker build -t railsaarthi-frontend ./railsaarthi-frontend

      - name: Build Backend Docker Image
        run: docker build -t railsaarthi-backend ./rail-saarthi-backend/rail-saarthi-backend

      - name: Build ML Docker Image
        run: docker build -t railsaarthi-ml ./ml-service